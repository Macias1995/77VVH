<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para un gran Doc ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
            color: #f8fafc;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow: hidden;
            position: relative;
        }

        /* FONDO DE ESTRELLAS SUTILES */
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            animation: pulse 3s infinite ease-in-out;
        }

        /* TARJETA PRINCIPAL ESTILO CRISTAL */
        .card {
            max-width: 550px;
            width: 100%;
            padding: 50px 30px;
            background: rgba(30, 41, 59, 0.4);
            border-radius: 32px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .message {
            font-size: 1.3rem;
            line-height: 1.8;
            font-weight: 300;
            color: #e2e8f0;
            min-height: 90px;
            margin-bottom: 30px;
        }

        .highlight {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.75rem;
            font-style: italic;
            color: #38bdf8;
            opacity: 0;
            transform: translateY(10px);
            transition: all 2s ease;
            margin-bottom: 35px;
        }

        .highlight.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        /* CONTENEDOR DE ABRAZOS INTERACTIVOS */
        .emojis-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            max-width: 360px;
            margin: 0 auto;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .emojis-container.reveal {
            opacity: 1;
        }

        .hug-btn {
            font-size: 2rem;
            background: none;
            border: none;
            cursor: pointer;
            user-select: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }

        .hug-btn:hover {
            transform: scale(1.3) rotate(10deg);
        }

        .hug-btn.clicked {
            transform: scale(0.9);
            opacity: 0.6;
        }

        /* CORAZONES FLOTANTES AL HACER CLIC */
        .floating-heart {
            position: absolute;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 2s forwards ease-out;
            z-index: 20;
        }

        /* ANIMACIONES */
        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.9; }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) translateX(var(--md-x, 0px)) scale(0.5); opacity: 0; }
        }

        @media (max-width: 480px) {
            .emojis-container { grid-template-columns: repeat(4, 1fr); }
            .message { font-size: 1.15rem; }
            .highlight { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="stars" id="starfield"></div>

    <div class="card">
        <!-- El texto se escribirá dinámicamente aquí -->
        <p class="message" id="typewriter-text"></p>
        
        <p class="highlight" id="phrase-highlight">
            Un abrazo por cada hora de turno.
        </p>
        
        <!-- 12 botones individuales de abrazos -->
        <div class="emojis-container" id="emojis-box">
            <button class="hug-btn" onclick="sendLove(this)">🤗</button>
            <button class="hug-btn" onclick="sendLove(this)">🤗</button>
            <button class="hug-btn" onclick="sendLove(this)">🤗</button>
            <button class="hug-btn" onclick="sendLove(this)">🤗</button>
            <button class="hug-btn" onclick="sendLove(this)">🤗</button>
            <button class="hug-btn" onclick="sendLove(this)">🤗</button>
            <button class="hug-btn" onclick="sendLove(this)">🤗</button>
            <button class="hug-btn" onclick="sendLove(this)">🤗</button>
            <button class="hug-btn" onclick="sendLove(this)">🤗</button>
            <button class="hug-btn" onclick="sendLove(this)">🤗</button>
            <button class="hug-btn" onclick="sendLove(this)">🤗</button>
            <button class="hug-btn" onclick="sendLove(this)">🤗</button>
        </div>
    </div>

    <script>
        // Generar estrellas de fondo aleatorias
        const starfield = document.getElementById('starfield');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starfield.appendChild(star);
        }

        // Efecto Máquina de Escribir
        const textStr = "Un buen turno Doc, recuerda que hay alguien que espera que hoy tengas una buena jornada.";
        const textTarget = document.getElementById('typewriter-text');
        let index = 0;

        function typeWriter() {
            if (index < textStr.length) {
                textTarget.innerHTML += textStr.charAt(index);
                index++;
                setTimeout(typeWriter, 45); // Velocidad de escritura
            } else {
                // Al terminar el texto principal, revela lo siguiente con suavidad
                setTimeout(() => {
                    document.getElementById('phrase-highlight').classList.add('reveal');
                }, 600);
                setTimeout(() => {
                    document.getElementById('emojis-box').classList.add('reveal');
                }, 1600);
            }
        }

        // Iniciar la animación al cargar la página
        window.onload = () => {
            setTimeout(typeWriter, 500);
        };

        // Interacción al hacer clic en los abrazos (Genera corazones flotantes)
        function sendLove(btn) {
            // Animación del propio emoji
            btn.classList.add('clicked');
            setTimeout(() => btn.classList.remove('clicked'), 300);

            // Crear corazón flotante
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerHTML = '❤️';
            
            // Posicionar el corazón justo encima del botón presionado
            const rect = btn.getBoundingClientRect();
            heart.style.left = (rect.left + rect.width / 2 - 12) + 'px';
            heart.style.top = (rect.top - 20) + 'px';
            
            // Variación aleatoria en el eje X para la animación hacia arriba
            const randomX = (Math.random() * 60 - 30) + 'px';
            heart.style.setProperty('--md-x', randomX);

            document.body.appendChild(heart);

            // Eliminar el elemento una vez termine la animación
            setTimeout(() => {
                heart.remove();
            }, 2000);
        }
    </script>
</body>
</html>
