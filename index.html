<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para un gran Doc ✨</title>
    <!-- Tipografía elegante y limpia -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0f172a; /* Fondo azul noche oscuro, relajante */
            color: #f8fafc;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            text-align: center;
        }

        /* Contenedor principal con sombra sutil estilo Apple */
        .card {
            max-width: 550px;
            padding: 40px 30px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 2s ease-out;
        }

        /* Estilo para el mensaje principal */
        .message {
            font-size: 1.25rem;
            line-height: 1.8;
            font-weight: 300;
            margin-bottom: 24px;
            color: #e2e8f0;
        }

        /* Estilo destacado para la frase del abrazo */
        .highlight {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-style: italic;
            color: #38bdf8; /* Azul cielo suave */
            margin-bottom: 30px;
        }

        /* Contenedor de los 12 abrazos */
        .emojis {
            font-size: 1.8rem;
            letter-spacing: 4px;
            line-height: 1.6;
            opacity: 0.9;
        }

        /* Animación de entrada suave */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <p class="message">
            Un buen turno Doc, recuerda que hay alguien que espera que hoy tengas una buena jornada.
        </p>
        
        <p class="highlight">
            Un abrazo por cada hora de turno.
        </p>
        
        <div class="emojis">
            🤗🤗🤗🤗🤗🤗🤗🤗🤗🤗🤗🤗
        </div>
    </div>

</body>
</html>
